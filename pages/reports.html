<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - HR Portal</title>
  <link rel="stylesheet" href="../css/themes.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  
  <div class="app-container dashboard-layout">
    
    <!-- Sidebar -->
    <aside class="sidebar glass-panel" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">HR Portal</div>
      </div>
      
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon">📊</span>
          <span class="nav-text">Dashboard</span>
        </a>
        <a href="employees.html" class="nav-item">
          <span class="nav-icon">👥</span>
          <span class="nav-text">Employees</span>
        </a>
        <a href="reports.html" class="nav-item active">
          <span class="nav-icon">📈</span>
          <span class="nav-text">Reports</span>
        </a>
        <a href="settings.html" class="nav-item">
          <span class="nav-icon">⚙️</span>
          <span class="nav-text">Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer" style="padding: 1rem;">
        <div class="user-profile-card">
          <div class="avatar" id="user-avatar">A</div>
          <div class="user-info">
            <span class="user-name" id="user-name">Admin</span>
            <span class="user-role">HR Manager</span>
          </div>
          <button class="logout-icon-btn" id="logout-btn" title="Logout">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <!-- Topbar -->
      <header class="topbar glass-panel">
        <div class="topbar-left">
          <button class="btn-icon" id="sidebar-toggle">☰</button>
          <h2>Reports & Analytics</h2>
        </div>
        
        <div class="topbar-right">
          <button class="btn-icon" id="theme-toggle">🌓</button>
        </div>
      </header>

      <!-- Content -->
      <div class="content-area">
        
        <div class="quick-actions">
          <button class="btn btn-primary" id="export-csv-btn">
            <span style="font-size: 1.2rem;">📥</span> Export Data to CSV
          </button>
        </div>

        <div class="glass-panel animate-fade-in" style="padding: 1.5rem; margin-bottom: 1.5rem;">
          <h3>Salary Statistics</h3>
          <div class="stats-grid mt-4">
            <div class="stat-card" style="background: rgba(0,0,0,0.02);">
              <div class="stat-info">
                <h3>Average Salary</h3>
                <p id="rep-avg-salary">₹0</p>
              </div>
            </div>
            <div class="stat-card" style="background: rgba(0,0,0,0.02);">
              <div class="stat-info">
                <h3>Highest Salary</h3>
                <p id="rep-high-salary">₹0</p>
              </div>
            </div>
            <div class="stat-card" style="background: rgba(0,0,0,0.02);">
              <div class="stat-info">
                <h3>Lowest Salary</h3>
                <p id="rep-low-salary">₹0</p>
              </div>
            </div>
          </div>
          
          <div class="mt-4 pt-4" style="border-top: 1px solid var(--glass-border);">
            <h4 style="margin-bottom: 1rem; color: var(--text-secondary);">Average Salary by Department</h4>
            <div class="chart-container" style="height: 300px; width: 100%;">
              <canvas id="reportSalaryChart"></canvas>
            </div>
          </div>
        </div>

        <div class="charts-grid animate-fade-in">
          <div class="chart-card glass-panel">
            <div class="chart-header">
              <h3>Employee Status Breakdown</h3>
            </div>
            <div class="chart-container">
              <canvas id="statusChart"></canvas>
            </div>
          </div>
          
          <div class="glass-panel" style="padding: 1.5rem;">
            <h3>Recent Joinings</h3>
            <ul class="activity-list" id="recent-joiners">
              <!-- Populated by JS -->
            </ul>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="../js/theme.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/chart.js"></script>
  <script src="../js/csv.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Export Button
      document.getElementById('export-csv-btn').addEventListener('click', () => {
        CSVExport.exportEmployees();
      });
      
      const employees = JSON.parse(localStorage.getItem('employees')) || [];
      if (employees.length === 0) return;
      
      // Salary Stats
      const salaries = employees.map(e => e.salary);
      const avg = salaries.reduce((a, b) => a + b, 0) / salaries.length;
      const max = Math.max(...salaries);
      const min = Math.min(...salaries);
      
      const formatter = new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 });
      
      document.getElementById('rep-avg-salary').textContent = formatter.format(avg);
      document.getElementById('rep-high-salary').textContent = formatter.format(max);
      document.getElementById('rep-low-salary').textContent = formatter.format(min);
      
      // Salary by Department Chart
      const deptSalary = {};
      const deptCount = {};
      
      employees.forEach(emp => {
        deptSalary[emp.department] = (deptSalary[emp.department] || 0) + emp.salary;
        deptCount[emp.department] = (deptCount[emp.department] || 0) + 1;
      });
      
      const salaryLabels = Object.keys(deptSalary);
      const salaryData = salaryLabels.map(dept => deptSalary[dept] / deptCount[dept]);
      
      const renderSalaryChart = () => {
        const barColors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#0ea5e9'];
        SimpleChart.drawBarChart('reportSalaryChart', salaryData, salaryLabels, {}, barColors);
      };
      
      renderSalaryChart();
      window.addEventListener('resize', renderSalaryChart);
      window.addEventListener('themeChanged', renderSalaryChart);

      // Status Chart
      const statusCounts = {};
      employees.forEach(emp => {
        statusCounts[emp.status] = (statusCounts[emp.status] || 0) + 1;
      });
      
      const statusLabels = Object.keys(statusCounts);
      const statusData = Object.values(statusCounts);
      const statusColors = ['#10b981', '#f59e0b', '#ef4444'];
      
      const renderStatusChart = () => {
        SimpleChart.drawPieChart('statusChart', statusData, statusLabels, statusColors);
      };
      
      renderStatusChart();
      window.addEventListener('resize', renderStatusChart);
      window.addEventListener('themeChanged', renderStatusChart);
      
      // Recent Joinings (sort by date descending)
      const sortedByDate = [...employees].sort((a, b) => new Date(b.joiningDate) - new Date(a.joiningDate)).slice(0, 5);
      
      const listEl = document.getElementById('recent-joiners');
      sortedByDate.forEach(emp => {
        const li = document.createElement('li');
        li.className = 'activity-item';
        li.innerHTML = `
          <div class="employee-cell" style="flex: 1;">
            <div class="employee-avatar" style="width: 30px; height: 30px; font-size: 0.75rem;">
              ${emp.name.charAt(0).toUpperCase()}
            </div>
            <div>
              <div style="font-weight: 500; font-size: 0.875rem;">${emp.name}</div>
              <div style="font-size: 0.75rem; color: var(--text-muted);">${emp.department}</div>
            </div>
          </div>
          <span class="activity-time">${new Date(emp.joiningDate).toLocaleDateString()}</span>
        `;
        listEl.appendChild(li);
      });
    });
  </script>
</body>
</html>
