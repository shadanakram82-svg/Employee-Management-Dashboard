<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - HR Portal</title>
  <link rel="stylesheet" href="../css/themes.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }
    
    .login-card {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .login-header h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent-color), #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .password-wrapper {
      position: relative;
    }
    
    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
    }
    
    .login-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.875rem;
      margin-bottom: 1.5rem;
    }
    
    .login-options label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      cursor: pointer;
    }

    .error-text {
      color: var(--danger);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      display: none;
    }
    
    .form-group.error .form-control {
      border-color: var(--danger);
    }
    
    .form-group.error .error-text {
      display: block;
    }
  </style>
</head>
<body>
  
  <div class="login-container">
    <div class="glass-panel login-card animate-fade-in">
      <div class="login-header">
        <h1>HR Portal</h1>
        <p>Sign in to manage your team</p>
      </div>
      
      <form id="login-form" novalidate>
        <div class="form-group" id="email-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-control" placeholder="admin@company.com" required>
          <div class="error-text">Please enter a valid email address.</div>
        </div>
        
        <div class="form-group" id="password-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            <button type="button" class="password-toggle" id="toggle-password">Show</button>
          </div>
          <div class="error-text">Password is required.</div>
        </div>
        
        <div class="login-options">
          <label>
            <input type="checkbox" id="remember-me"> Remember Me
          </label>
          <a href="#" id="forgot-password">Forgot Password?</a>
        </div>
        
        <button type="submit" class="btn btn-primary w-full" id="login-btn">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script src="../js/theme.js"></script>
  <script src="../js/validation.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
