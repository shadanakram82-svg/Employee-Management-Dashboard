<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Profile - HR Portal</title>
  <link rel="stylesheet" href="../css/themes.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  
  <div class="app-container dashboard-layout">
    
    <!-- Sidebar -->
    <aside class="sidebar glass-panel" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">HR Portal</div>
      </div>
      
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon">📊</span>
          <span class="nav-text">Dashboard</span>
        </a>
        <a href="employees.html" class="nav-item">
          <span class="nav-icon">👥</span>
          <span class="nav-text">Employees</span>
        </a>
        <a href="reports.html" class="nav-item">
          <span class="nav-icon">📈</span>
          <span class="nav-text">Reports</span>
        </a>
        <a href="settings.html" class="nav-item">
          <span class="nav-icon">⚙️</span>
          <span class="nav-text">Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="#" class="nav-item" id="logout-btn">
          <span class="nav-icon">🚪</span>
          <span class="nav-text">Logout</span>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <!-- Topbar -->
      <header class="topbar glass-panel">
        <div class="topbar-left">
          <button class="btn-icon" id="sidebar-toggle">☰</button>
          <h2>My Profile</h2>
        </div>
        
        <div class="topbar-right">
          <button class="btn-icon" id="theme-toggle">🌓</button>
          <div class="user-profile">
            <div class="avatar" id="user-avatar">A</div>
            <span id="user-name">Admin</span>
          </div>
        </div>
      </header>

      <!-- Content -->
      <div class="content-area">
        <div class="glass-panel animate-fade-in" style="max-width: 600px; padding: 2rem; text-align: center;">
          <div class="avatar" style="width: 100px; height: 100px; font-size: 3rem; margin: 0 auto 1.5rem auto;">A</div>
          <h2>System Administrator</h2>
          <p class="mt-4" style="color: var(--text-muted);">Email: admin@company.com</p>
          <p style="color: var(--text-muted);">Role: Super Admin</p>
          
          <button class="btn btn-primary mt-4" onclick="window.location.href='settings.html'">Edit Preferences</button>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/theme.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
