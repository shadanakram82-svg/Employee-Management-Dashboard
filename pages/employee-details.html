<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Details - HR Portal</title>
  <link rel="stylesheet" href="../css/themes.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  
  <div class="app-container dashboard-layout">
    
    <!-- Sidebar -->
    <aside class="sidebar glass-panel" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">HR Portal</div>
      </div>
      
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon">📊</span>
          <span class="nav-text">Dashboard</span>
        </a>
        <a href="employees.html" class="nav-item">
          <span class="nav-icon">👥</span>
          <span class="nav-text">Employees</span>
        </a>
        <a href="reports.html" class="nav-item">
          <span class="nav-icon">📈</span>
          <span class="nav-text">Reports</span>
        </a>
        <a href="settings.html" class="nav-item">
          <span class="nav-icon">⚙️</span>
          <span class="nav-text">Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer" style="padding: 1rem;">
        <div class="user-profile-card">
          <div class="avatar" id="user-avatar">A</div>
          <div class="user-info">
            <span class="user-name" id="user-name">Admin</span>
            <span class="user-role">HR Manager</span>
          </div>
          <button class="logout-icon-btn" id="logout-btn" title="Logout">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      
      <!-- Topbar -->
      <header class="topbar glass-panel">
        <div class="topbar-left">
          <button class="btn-icon" id="sidebar-toggle">☰</button>
          <h2>Employee Details</h2>
        </div>
        
        <div class="topbar-right">
          <button class="btn-icon" id="theme-toggle">🌓</button>
        </div>
      </header>

      <!-- Content -->
      <div class="content-area">
        <button class="btn btn-outline" style="margin-bottom: 1.5rem;" onclick="window.location.href='employees.html'">
          ← Back to Directory
        </button>

        <div id="details-container">
          <!-- Filled by JS -->
          <div style="text-align: center; padding: 3rem;">
            Loading employee details...
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/theme.js"></script>
  <script src="../js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const empId = urlParams.get('id');
      
      if (!empId) {
        document.getElementById('details-container').innerHTML = `
          <div class="glass-panel" style="text-align: center; padding: 3rem;">
            <h3>Employee Not Found</h3>
            <p>No employee ID was provided in the URL.</p>
          </div>
        `;
        return;
      }
      
      const employees = JSON.parse(localStorage.getItem('employees')) || [];
      const employee = employees.find(e => e.id === empId);
      
      if (!employee) {
        document.getElementById('details-container').innerHTML = `
          <div class="glass-panel" style="text-align: center; padding: 3rem;">
            <h3>Employee Not Found</h3>
            <p>The requested employee could not be found in the database.</p>
          </div>
        `;
        return;
      }
      
      // Render details
      let statusClass = '';
      if (employee.status === 'Active') statusClass = 'success';
      else if (employee.status === 'On Leave') statusClass = 'warning';
      else statusClass = 'danger';
      
      document.getElementById('details-container').innerHTML = `
        <div class="glass-panel animate-fade-in" style="padding: 0; overflow: hidden;">
          <div style="background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1)); padding: 2rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; border-bottom: 1px solid var(--glass-border);">
            <div class="employee-avatar" style="width: 80px; height: 80px; font-size: 2rem;">
              ${employee.name.charAt(0).toUpperCase()}
            </div>
            <div>
              <h2 style="margin-bottom: 0.25rem;">${employee.name}</h2>
              <div style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 0.5rem;">
                ${employee.designation} • ${employee.department}
              </div>
              <span class="badge badge-${statusClass}">${employee.status}</span>
            </div>
          </div>
          
          <div style="padding: 1.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem;">
            <div>
              <h3 style="margin-bottom: 1rem; font-size: 1.1rem; color: var(--text-secondary); border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;">Contact Information</h3>
              <div style="display: flex; flex-direction: column; gap: 1rem;">
                <div>
                  <small style="color: var(--text-muted); display: block; margin-bottom: 0.25rem;">Email</small>
                  <strong id="det-email"></strong>
                </div>
                <div>
                  <small style="color: var(--text-muted); display: block; margin-bottom: 0.25rem;">Phone</small>
                  <strong id="det-phone"></strong>
                </div>
                <div>
                  <small style="color: var(--text-muted); display: block; margin-bottom: 0.25rem;">Address</small>
                  <strong id="det-address">${employee.address || 'N/A'}</strong>
                </div>
              </div>
            </div>
            
            <div>
              <h3 style="margin-bottom: 1rem; font-size: 1.1rem; color: var(--text-secondary); border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;">Employment Details</h3>
              <div style="display: flex; flex-direction: column; gap: 1rem;">
                <div>
                  <small style="color: var(--text-muted); display: block; margin-bottom: 0.25rem;">Employee ID</small>
                  <strong>${employee.id}</strong>
                </div>
                <div>
                  <small style="color: var(--text-muted); display: block; margin-bottom: 0.25rem;">Salary</small>
                  <strong id="det-salary">₹0</strong>
                </div>
                <div>
                  <small style="color: var(--text-muted); display: block; margin-bottom: 0.25rem;">Joining Date</small>
                  <strong id="det-date"></strong>
                </div>
                <div>
                  <small style="color: var(--text-muted); display: block; margin-bottom: 0.25rem;">Gender</small>
                  <strong>${employee.gender || 'N/A'}</strong>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
      
      // Format text
      setTimeout(() => {
        document.getElementById('det-email').textContent = employee.email;
        document.getElementById('det-phone').textContent = employee.phone || 'N/A';
        
        const formatter = new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' });
        document.getElementById('det-salary').textContent = formatter.format(employee.salary);
        
        document.getElementById('det-date').textContent = new Date(employee.joiningDate).toLocaleDateString();
      }, 0);
    });
  </script>
</body>
</html>
